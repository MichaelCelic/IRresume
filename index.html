<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Zuazo OS - Interactive Resume</title>
  <link rel="stylesheet" href="./css/aero.css">
  <link rel="stylesheet" href="./css/desktop.css">
  <link rel="stylesheet" href="./css/taskbar.css">
  <link rel="stylesheet" href="./css/apps.css">
</head>
<body>
  <div id="boot-screen" class="boot-screen">
    <div class="boot-content">
      <h1>Michael Zuazo OS - Loading...</h1>
      <div class="boot-bar"><div class="boot-progress"></div></div>
    </div>
  </div>

  <main id="desktop" class="desktop hidden">
    <div class="wallpaper-base"></div>
    <div class="cloud cloud-far"></div>
    <div class="cloud cloud-near"></div>
    <div class="bubble-layer"></div>
    <div class="flare-layer"></div>

    <section id="desktop-icons" class="desktop-icons" aria-label="Desktop icons"></section>
    <section id="window-layer" class="window-layer" aria-label="Application windows"></section>
    <div id="welcome-balloon" class="welcome-balloon hidden">Welcome back, Michael!</div>
  </main>

  <footer class="taskbar hidden" id="taskbar">
    <button id="start-button" class="start-button" type="button">MZ</button>
    <div id="taskbar-tabs" class="taskbar-tabs"></div>
    <div class="system-tray">
      <span class="tray-icon" aria-hidden="true">📶</span>
      <span class="tray-icon" aria-hidden="true">👤</span>
      <span id="live-clock">00:00</span>
    </div>
  </footer>

  <script src="./js/appContents.js"></script>
  <script src="./js/mzAppsExtended.js"></script>
  <script src="./js/windowManager.js"></script>
</body>
</html>
